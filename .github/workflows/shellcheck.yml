name: shellcheck

on:
  push:
    branches: [main]
    paths: ['**.sh', '.shellcheckrc']
  pull_request:
    paths: ['**.sh', '.shellcheckrc']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -S warning
      - name: Bash syntax check
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 -n1 bash -n
